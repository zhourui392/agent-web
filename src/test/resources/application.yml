agent:
  auth:
    cookie-secure: false
  public-access:
    enabled: false
  fs:
    roots:
      - /tmp
  cli:
    codex:
      exec: echo
      stdin: true
      timeout-seconds: 0
    claude:
      exec: echo
      stdin: true
      timeout-seconds: 0
spring:
  main:
    banner-mode: "off"
  datasource:
    url: "jdbc:sqlite:file:testdb?mode=memory&cache=shared"
    driver-class-name: org.sqlite.JDBC
