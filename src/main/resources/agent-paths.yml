# 各机器易变的主机路径，单独拆出便于按环境(Linux 服务器 / 各人 dev 机)区分。
# 被 application.yml 的 spring.config.import 强制加载；文件缺失或格式错误时应用拒绝启动。
#
# 仓库提交的是 Linux 服务器路径。本机(dev)按需改这里；不想把本机改动 push 回去，可执行一次：
#   git update-index --skip-worktree src/main/resources/agent-paths.yml
# 之后本地修改不再进入 git 暂存区(恢复跟踪: git update-index --no-skip-worktree ...)。
#
# 注意：list 是整体替换不是合并，roots 要写全本环境要用的全部条目。
# fs.roots 同时是文件接口与 Git worktree 的工作空间授权边界；不要加入只读凭据目录。

agent:
  fs:
    roots:
      # 旧 AGENT_WORKTREE_ALLOWED_ROOT 仅作兼容回退，新部署统一使用 AGENT_WORKSPACE_ROOT。
      - "${AGENT_WORKSPACE_ROOT:${AGENT_WORKTREE_ALLOWED_ROOT:${user.home}/workspace}}"
    # 额外上传根默认不开放；需要时从管理后台加入真实存在的目录。
    upload-roots: []
