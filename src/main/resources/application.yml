server:
  # Caddy 与服务同机，应用端口仅监听 loopback；公网只经 Caddy 443 进入。
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: 18092
  # 由可信反向代理终止 HTTPS；只有后端端口不对公网开放时，才可信任转发头。
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  servlet:
    # 独立域名直接挂根路径：https://agent.mokatu.shop/，不再使用 /qa 前缀。
    context-path: ""
    async:
      timeout: 7200000
  tomcat:
    connection-timeout: 7200000
    keep-alive-timeout: 7200000
    # 网关后置时 Tomcat 看到的 Host 是内网 IP。默认 sendRedirect 的相对路径会被绝对化成
    # http://<内网IP>/... (浏览器到不了)。置 true 后 Location 保持 host-relative(如 /admin/dashboard.html),
    # 由浏览器按地址栏的公网域名解析。显式配置的登录页绝对 URL 不受影响。
    use-relative-redirects: true

# Allowed roots for browsing on the host running this web service.
# IMPORTANT: narrow this to specific workspace folders in production.
agent:
  default-type: CODEX    # 对话默认模型「首启种子」: DB(app_setting) 无值时回退此值; 落库后以管理后台为准。可选 CODEX/CLAUDE
  chat:
    # 对话用户隔离开关。true=普通用户仅见自己的会话(+老数据 user_id IS NULL);
    # false=全员互见(可看到其他用户的对话)。默认安全地按用户隔离。
    user-isolation-enabled: ${AGENT_CHAT_USER_ISOLATION_ENABLED:true}
    session-cache-max-entries: ${AGENT_CHAT_SESSION_CACHE_MAX_ENTRIES:1000}
    # 普通聊天最终回答约束: 让 agent 把最终结论依赖的查询证据压缩到 assistant 正文中,
    # 便于后续 refinery/RAG 抽取,同时避免把完整 tool_result/log/SQL 大结果灌入上下文。
    final-answer-instruction-enabled: ${AGENT_CHAT_FINAL_ANSWER_INSTRUCTION_ENABLED:true}
    final-answer-instruction: |+
      [最终回答要求]
      如果本轮使用了数据库、日志、ES、Redis、配置中心或其他工具查询，请在最终回答中保留一个简短“证据摘要”小节，便于后续经验沉淀与召回。
      要求：
      1. 先给结论，避免只输出过程。
      2. 证据摘要只写最终结论实际依赖的查询结果；中间试探、无效查询、0命中且未参与结论的查询不要写。
      3. 每条证据控制在一行，最多 5 条。
      4. 每条证据优先包含：数据源/表或服务、查询条件、命中行数、关键字段、错误码/状态。
      5. 不要粘贴完整工具输出、SQL 大结果、日志大段或 JSON 原文。
      6. 如果没有使用工具查询，或查询结果对结论无贡献，可以省略证据摘要。
      推荐格式：
      ## 结论
      ...

      ## 证据摘要
      | 来源 | 查询条件 | 命中/关键字段 | 支撑结论 |
      | --- | --- | --- | --- |
      | ... | ... | ... | ... |

      ## 处理建议
      ...
  fs:
    roots:
      - "/home/service/workspace"
      - "/home/service/.claude/skills"
    # upload-roots 仅对 /api/fs/upload 生效,不开放 download/delete/list,
    # 用于允许同步脚本写入 ~/.agent-web,但目录内文件不会被 download 接口下载。
    upload-roots:
      - "/home/service/.agent-web"
  worktree:
    # 允许作为 worktree workspace 根的目录白名单(绝对路径)。worktree 操作的 workspacePath 必须落在某个根下。
    # 主配置 fail-closed 给出单一安全根；本机目录不同时用环境变量覆盖。
    allowed-roots:
      - ${AGENT_WORKTREE_ALLOWED_ROOT:/home/service/workspace}
  cli:
    codex:
      exec: ${CODEX_CMD:codex}
      # args 留空 → CodexCliDialect 走真实 codex exec --json 路径; 配模板则回退 legacy 文本路径
      args: []
      stdin: true
      timeout-seconds: ${CODEX_TIMEOUT_SECONDS:1800}
      max-output-bytes: ${CODEX_MAX_OUTPUT_BYTES:10485760}
      model: ""                    # 留空使用 codex 默认模型; 需指定时设 gpt-5.1-codex 等
      sandbox-bypass: ${CODEX_SANDBOX_BYPASS:false}
      skip-git-check: true         # → --skip-git-repo-check
      extra-args: []               # 透传 codex exec 的额外参数
    claude:
      exec: ${CLAUDE_CLI_CMD:claude}
      args:
        - --print
        - --output-format
        - stream-json
        - --verbose
        - --include-partial-messages
        - --permission-mode
        - acceptEdits
        # 钉死 1M 上下文变体: 续聊(--resume)不带 --model 时 CLI 会退回基础版 claude-opus-4-8(200K),
        # 只有全新会话才自动选 [1m]; 显式带上保证全新+续聊都跑 1M。refinery 评分若另传 --model,
        # 因追加在更后面、CLI 取最后一个 --model, 不受影响。换模型/换区域改这里即可。
        - --model
        - ${CLAUDE_CLI_MODEL:claude-opus-4-8[1m]}
      stdin: true
      timeout-seconds: ${CLAUDE_TIMEOUT_SECONDS:1800}
      max-output-bytes: ${CLAUDE_MAX_OUTPUT_BYTES:10485760}
  envs:
    - key: test
      label: 测试环境
      color: "#67c23a"
      prompt: "[环境约束: 当前为测试环境，可以查询和验证问题；未经用户明确要求，不得修改代码、配置或工作区文件]\n"
    - key: prod
      label: 生产环境
      color: "#f56c6c"
      prompt: "[环境约束: 当前为生产环境，禁止执行任何写操作(INSERT/UPDATE/DELETE/DROP等)，只允许SELECT查询]\n"
  run:
    # AgentRun 运行时上下文灰度开关。紧急止血时可用环境变量关闭,无需改代码。
    workspace-context-enabled: ${AGENT_RUN_WORKSPACE_CONTEXT_ENABLED:true}
    workspace-knowledge-enabled: ${AGENT_RUN_WORKSPACE_KNOWLEDGE_ENABLED:true}
    recall-top-k: ${AGENT_RUN_RECALL_TOP_K:8}
  auth:
    cookie-name: ${AGENT_AUTH_COOKIE_NAME:__Host-agent_session}
    # 公网入口必须是 HTTPS；Secure Cookie 不会通过明文 HTTP 回传。
    cookie-secure: ${AGENT_AUTH_COOKIE_SECURE:true}
    # 用户名 + 密码登录会话有效期(秒),默认 7 天。
    session-ttl-seconds: ${AGENT_AUTH_SESSION_TTL_SECONDS:604800}
    # 对外规范登录页 URL；留空时使用当前应用下的 /login.html。
    login-page-url: ${AGENT_AUTH_LOGIN_PAGE_URL:}
    # 同一 socket 来源 IP 或同一用户名在窗口内失败达到阈值后拒绝继续验密。
    login-max-failures: ${AGENT_AUTH_LOGIN_MAX_FAILURES:5}
    login-failure-window-seconds: ${AGENT_AUTH_LOGIN_FAILURE_WINDOW_SECONDS:300}
  public-access:
    # 公网模式下若数据库仍是公开的种子密码，启动会失败；首次启动必须提供新的管理员密码。
    enabled: ${AGENT_PUBLIC_ACCESS_ENABLED:true}
    bootstrap-admin-password: ${AGENT_BOOTSTRAP_ADMIN_PASSWORD:}
  # 管理后台复用数据库用户会话，下列路径额外要求 ADMIN 角色。
  admin:
    protected-prefixes:
      - /api/metrics
      - /api/admin-user-suggestions
      - /api/admin-workflows
      - /api/admin-workflow-executions
      - /api/admin-settings
      - /api/refinery
      - /api/issue-log-backfill
      - /api/diagnose-history

  # issue-log 写盘通道配置
  issue-log:
    docs-dir: docs/issue-log
    issues-subdir: issue
    index-file: INDEX.md
    auto-init: true                # docs/issue-log 不存在时自动建目录 + 写 INDEX 表头
    slug-max-length: 50

  # Knowledge Refinery: 会话/诊断向量召回. 默认关闭, 缺 API key 启动不死.
  # 打开后: scheduler 自动评分聚合高价值会话 → embed → 入库; 前端"RAG 召回"开关开时每条消息自动召回历史参考.
  refinery:
    enabled: ${REFINERY_ENABLED:false}        # 总开关; false 时下列子模块全部不注册 bean. 本地用 REFINERY_ENABLED=true 打开, 不改默认
    poll:
      silent-minutes: 30                      # 会话静默 N 分钟才认为"完结", 进入评分队列
      interval-seconds: 300                   # scheduler tick 间隔
      max-per-tick: 5                         # 每轮最多评分会话数, 节流 CLI 调用
      max-retries: 3                          # 真·失败(CLI/embedding 报错)会话的重试上限, 达到后不再入选, 防确定性失败钉死调度窗口; below-threshold 不重试
    refine:
      enabled: true                           # 关闭后纯走启发式, 不调 LLM
      timeout-seconds: 180                    # LLM 评分单次硬超时
      prompt-template: classpath:/refinery-refine-prompt.md
      token-budget: 30000                     # 粗估 4 字符/token, 倒序保留最近消息
      score-threshold: 0.5                    # 评分低于此值的会话直接丢弃, 不入库
      persist-discarded: true                 # below-threshold 会话落 chat_rag_discarded 留痕, 供管理台"已丢弃(低分)"展示与阈值校准; 关掉则低分静默丢弃不留痕
      model: ${REFINERY_REFINE_MODEL:}        # 评分专用模型, 空=回退 session CLI 默认模型. 注意 model 按 session 的 CLI 透传 (--model), 默认 Agent 已切 CODEX, 不能再默认填 Claude 系模型 (claude-haiku-4-5-20251001[1m] 传给 codex CLI 会评分失败); 如需廉价模型须保证与全量 session 的 CLI 兼容
      retry:                                  # 单次评分内的即时指数退避, 专扛 CLI 中转瞬态 5xx/429 (与 poll.max-retries 的跨 tick 会话级重试正交叠加); 仅瞬态错误重试, 鉴权/超时等确定性错误立即上抛
        max-attempts: 3                       # 总尝试次数(含首次), 1=关闭重试
        initial-backoff-ms: 1000              # 首次退避
        multiplier: 2.0                       # 每次重试 backoff *= multiplier (1s→2s→4s...)
        max-backoff-ms: 8000                  # 退避封顶, 避免单次评分拖太久
    embedding:
      # 变量名兼容: chat-rag→refinery 改名后, 部署环境/.env 与文档仍用 CHAT_RAG_EMBED_*, 故优先读旧名再回退新名, 避免改名错位导致 api-key 为空 -> Ark 401
      # 2026-06-11 默认模型切换: doubao-embedding-vision(Ark) → qwen3-embedding-8b(OpenRouter).
      # vision 是图文多模态模型, 文本检索相关带被压扁导致召回全灭; 且存量 chunk 已全量重嵌为
      # qwen 4096 维 (存量 chunk 已全量重嵌入), 默认值若仍指 doubao 会在漏配 env 时维度错配.
      endpoint: ${CHAT_RAG_EMBED_ENDPOINT:${REFINERY_EMBED_ENDPOINT:https://openrouter.ai/api/v1}}
      model: ${CHAT_RAG_EMBED_MODEL:${REFINERY_EMBED_MODEL:qwen/qwen3-embedding-8b}}
      api-key: ${CHAT_RAG_EMBED_API_KEY:${REFINERY_EMBED_API_KEY:}}     # 必填 (enabled=true 时), 仅从环境变量取, 严禁硬编码
      dimension: ${REFINERY_EMBED_DIM:4096}   # qwen3-embedding-8b 返回 4096 维; 换模型须同步改并重嵌入存量 chunk
      max-input-chars: 8000                   # 超长输入前缀截断 + WARN
      http-connect-timeout-ms: 5000
      http-read-timeout-ms: 30000
    privacy:
      # 入库前对结论文本的脱敏正则, 防 API key / JWT / 用户名路径段泄漏到向量
      redact-patterns:
        - "(?i)(api[_-]?key|secret|token|password)[\"'\\s:=]+[A-Za-z0-9\\-_./+=]{8,}"
        - "eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
        - "(?i)C:\\\\Users\\\\[^\\\\\\s]+"
        - "(?i)/(?:home|Users)/[^/\\s]+"
    recall:
      top-k: 3                                # 召回返回最多 N 条结果
      # 是否触发召回由前端"RAG 召回"开关逐条决定(默认开), 不再有服务端开关
      include-archived: false                 # 软删 chunk 是否参与召回
      cross-source-enabled: false             # chat 召回是否可命中 DIAGNOSE VERIFIED chunk
      min-vector-score: 0.6                   # 余弦(纯向量)绝对硬闸(0,1]; <=0 关闭. 融合排序前先剔 cos<阈值 的 chunk——这是真正的相关性闸. 2026-06-11 按 qwen3-embedding-8b 空间重标定(旧值 0.65 是 doubao-embedding-vision 的标定, 该模型相关带被压到 0.55~0.75, 0.65 把召回卡死——6-09 起约 40 次真实 query 全灭): qwen3 实测 vs 库内长文档向量, 同义提问 cos≈0.74 / 相关口语提问 cos≈0.64 / 无关 cos≈0.19, 取 0.6 让口语化提问能进、无关仍有 0.4+ 余量. 偏多调高, 误杀有用调低, 看 refinery-recall debug 日志的 topCosine 校准. 注意: 换 embedding 模型必须重标定此值并重嵌入存量 chunk
      # 双轴阈值(召回治理 §A2): 低可信 chunk 要求更高余弦相关性才允许进入候选; 未列出的 tier 回落 min-vector-score.
      # 标定基准同上(qwen3): EXPLORATORY 0.70 介于口语相关 0.64 与同义 0.74 之间——未验证结论只放"高度相似"的进.
      # 换 embedding 模型必须整组重标定.
      min-vector-score-by-tier:
        VERIFIED: 0.60
        PENDING: 0.66
        EXPLORATORY: 0.70
      cache-enabled: true                     # 进程内快照缓存(§B4): 召回读路径零 SQL; 写路径自动失效. 排障必要时可关
      cache-max-chunks: 50000                 # 快照软上限(约 800MB@4096维): 超限告警并回落直查, 防 heap 意外膨胀
      min-score: 0.0                          # 融合分绝对下限; <=0 关闭. 融合分含与 query 无关的 γ·decay·score 常数底(每条垫~0.05-0.1)会污染该阈值, 故相关性把关交给 min-vector-score, 此项默认留关
      min-score-ratio: 0.5                    # 融合分相对最高命中的下限比例(0,1]; <=0 关闭. 0.5=只留分数≥最佳命中一半的, 截掉长尾弱相关(如问 expireAmount 时蹭"接口/支付"的旧条). 注意相对闸无法拒绝"全场都不相关"(最佳本身是噪声时地板被压低), 那种情形靠 min-vector-score 兜底
      half-life-days: 30                      # 时间衰减半衰期: exp(-ln2 * age/half)
      ranking:
        vector-weight: 0.7                    # 向量相似度权重 α
        signal-weight: 0.2                    # triggerSignals Jaccard 权重 β
        time-decay-weight: 0.2                # 时间衰减·score 权重 γ. 此项是入库质量分(三维评分)在召回端唯一的生效通道, 却被 decay∈[0,1] 二次衰减后再乘 γ; γ=0.1 时本项最大贡献仅 0.1, 而 cosine 独占 0.7, 入库辛苦评出的 score 到排序几乎不影响名次. 对 chat 而言 score 是覆盖全量、不依赖人工反馈的主质量信号, 故抬到 0.2 让它有感. 排序被 score 过度主导调低, 质量分仍无感调高, 看 refinery-recall debug 日志 topScore 分布校准
    ttl:
      code-days: 14                           # CODE 类结论 (代码细节, 易过期)
      deploy-days: 30                         # DEPLOY 类 (部署/配置, 中期有效)
      business-days: 60                       # BUSINESS 类 (业务规则, 较稳定)
      general-days: 30                        # GENERAL 类 (兜底分类)


spring:
  config:
    # 各机器易变的主机路径拆到 agent-paths.yml(resources),导入值覆盖本文件同名默认值。
    # 本机需要不同路径直接改那个文件(可 git update-index --skip-worktree 避免误提交)。
    # optional: 文件缺失时回退用下方 agent.fs.* 的 Linux 默认值。
    import: "optional:classpath:agent-paths.yml"
  datasource:
    url: jdbc:sqlite:${AGENT_DB_PATH:data/agent-web.db}?busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
    hikari:
      # foreign_keys 是连接级开关，每个 Hikari 连接建立时都强制开启。
      connection-init-sql: "PRAGMA foreign_keys=ON;"
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 7MB

# 日志级别（具体 pattern / appender / 文件滚动配置在 logback-spring.xml）
# 生产部署可通过 LOGGING_LEVEL_COM_EXAMPLE_AGENTWEB=INFO 覆盖
logging:
  level:
    root: INFO
    com.example.agentweb: DEBUG
