server:
  port: 17988
  servlet:
    async:
      timeout: 7200000
  tomcat:
    connection-timeout: 7200000
    keep-alive-timeout: 7200000

# Allowed roots for browsing on the host running this web service.
# IMPORTANT: narrow this to specific workspace folders in production.
agent:
  fs:
    roots:
      - "/home/ubuntu/qpon"
  cli:
    codex:
      exec: ${CODEX_CMD:codex}
      args:
        - exec
        - --skip-git-repo-check
        - --full-auto
      stdin: true
      timeout-seconds: 0
    claude:
      exec: ${CLAUDE_CLI_CMD:claude}
      args:
        - --print
        - --output-format
        - stream-json
        - --verbose
        - --include-partial-messages
        - --dangerously-skip-permissions
      stdin: true
      timeout-seconds: 0
  envs:
    #- key: test
    #  label: 测试环境
    #  color: "#67c23a"
    #  prompt: "[环境约束: 当前为测试环境，可以放心执行变更操作]\n"
    #- key: prod
    #  label: 生产环境
    #  color: "#f56c6c"
    #  prompt: "[环境约束: 当前为生产环境，禁止执行任何写操作(INSERT/UPDATE/DELETE/DROP等)，只允许SELECT查询]\n"
  auth:
    enabled: true
    username: admin
    password: "Aa135246"
    max-fail-count: 50

spring:
  datasource:
    url: jdbc:sqlite:${AGENT_DB_PATH:data/agent-web.db}
    driver-class-name: org.sqlite.JDBC
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
