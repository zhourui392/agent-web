server:
  port: 18092
  servlet:
    async:
      timeout: 7200000
  tomcat:
    connection-timeout: 7200000
    keep-alive-timeout: 7200000

# Allowed roots for browsing on the host running this web service.
# IMPORTANT: narrow this to specific workspace folders in production.
agent:
  fs:
    roots:
      - "D:\\qpon\\workspace"
  cli:
    codex:
      exec: ${CODEX_CMD:codex}
      args:
        - exec
        - --skip-git-repo-check
        - --full-auto
      stdin: true
      timeout-seconds: 0
    claude:
      exec: ${CLAUDE_CLI_CMD:claude}
      args:
        - --print
        - --output-format
        - stream-json
        - --verbose
        - --include-partial-messages
        - --dangerously-skip-permissions
      stdin: true
      timeout-seconds: 0
spring:
  datasource:
    url: jdbc:sqlite:${AGENT_DB_PATH:data/agent-web.db}
    driver-class-name: org.sqlite.JDBC
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
