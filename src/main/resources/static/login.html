<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Agent Web</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 380px;
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #303133;
      margin-bottom: 8px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: #909399;
      margin-bottom: 32px;
    }
    .el-input { margin-bottom: 20px; }
    .login-btn { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="loginApp">
    <div class="login-card">
      <div class="login-title">Agent Web</div>
      <div class="login-subtitle">请登录以继续</div>

      <el-form @submit.prevent="doLogin">
        <el-input
          v-model="username"
          placeholder="用户名"
          prefix-icon="User"
          size="large"
          @keydown.enter="doLogin"
          :disabled="loading"
        ></el-input>
        <el-input
          v-model="password"
          type="password"
          placeholder="密码"
          prefix-icon="Lock"
          size="large"
          show-password
          @keydown.enter="doLogin"
          :disabled="loading"
        ></el-input>
        <el-button
          type="primary"
          size="large"
          class="login-btn"
          :loading="loading"
          @click="doLogin"
        >登 录</el-button>
      </el-form>

      <el-alert
        v-if="errorMsg"
        :title="errorMsg"
        type="error"
        show-icon
        :closable="false"
        style="margin-top: 16px;"
      ></el-alert>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue/dist/index.iife.min.js"></script>
  <script>
    const { createApp, ref } = Vue;
    const app = createApp({
      setup() {
        const username = ref('');
        const password = ref('');
        const loading = ref(false);
        const errorMsg = ref('');

        async function doLogin() {
          if (!username.value || !password.value) {
            errorMsg.value = '请输入用户名和密码';
            return;
          }
          loading.value = true;
          errorMsg.value = '';
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: username.value, password: password.value })
            });
            const data = await res.json();
            if (data.success) {
              window.location.href = '/';
            } else {
              errorMsg.value = data.message || '登录失败';
            }
          } catch (e) {
            errorMsg.value = '网络错误，请稍后重试';
          } finally {
            loading.value = false;
          }
        }

        return { username, password, loading, errorMsg, doLogin };
      }
    });
    // Register all Element Plus icons
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }
    app.use(ElementPlus);
    app.mount('#loginApp');
  </script>
</body>
</html>
