<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · Agent Q&A</title>
  <link rel="stylesheet" href="vendor/element-plus.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    #app { height: 100%; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .login-card {
      width: 100%; max-width: 380px;
      background: #fff; border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      padding: 32px;
    }
    .login-title { font-size: 22px; font-weight: 600; color: #303133; margin: 0 0 4px 0; }
    .login-subtitle { font-size: 13px; color: #909399; margin: 0 0 24px 0; }
    .error-tip { color: #f56c6c; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-card">
      <h2 class="login-title">Agent Q&A</h2>
      <p class="login-subtitle">使用工号和用户名登录 · 会话保留 7 天</p>

      <el-form @submit.prevent="onManualLogin" label-position="top">
        <el-form-item label="工号">
          <el-input v-model="employeeId" placeholder="例如 E10001，对话记录通过工号隔离" clearable></el-input>
        </el-form-item>
        <el-form-item label="用户名">
          <el-input v-model="userName" placeholder="例如 张三" clearable
                    @keyup.enter="onManualLogin"></el-input>
        </el-form-item>
        <el-button :loading="submitting" @click="onManualLogin"
                   style="width: 100%;">登录</el-button>
      </el-form>

      <div v-if="errorMessage" class="error-tip">{{ errorMessage }}</div>
    </div>
  </div>

  <script src="js/base.js?v=20260611"></script>
  <script src="vendor/vue.global.js"></script>
  <script src="vendor/element-plus.full.min.js"></script>
  <script src="vendor/element-plus-icons-vue.iife.min.js"></script>
  <script>
    const { createApp, ref, onMounted } = Vue;

    const app = createApp({
      setup() {
        const employeeId = ref('');
        const userName = ref('');
        const submitting = ref(false);
        const errorMessage = ref('');

        // 取登录后跳回地址。URL 上 ?redirect=... 优先;无则默认首页。
        // sanitizeRedirect 兜底: /api/ 路径(如脏链接里的 /api/auth/logout, GET 过去 405
        // ErrorPage)与站外地址一律回退首页。
        function getRedirect() {
          const params = new URLSearchParams(window.location.search);
          return window.AppBase.sanitizeRedirect(
              params.get('redirect'), window.__APP_BASE__ || '');
        }

        // 记住上次登录成功的工号+用户名(localStorage 按 origin 隔离,/qa 与根域共享),
        // 下次进入登录页自动回显,省去重复输入。仅存非敏感的工号/用户名,不涉密码。
        const LOGIN_MEMORY_KEY = 'agentweb.manualLogin';
        function saveLoginMemory() {
          try {
            localStorage.setItem(LOGIN_MEMORY_KEY, JSON.stringify({
              employeeId: employeeId.value.trim(),
              userName: userName.value.trim()
            }));
          } catch (e) { /* 隐私模式 / 禁用 localStorage 时静默 */ }
        }
        function restoreLoginMemory() {
          try {
            const saved = JSON.parse(localStorage.getItem(LOGIN_MEMORY_KEY) || 'null');
            if (saved && typeof saved === 'object') {
              employeeId.value = saved.employeeId || '';
              userName.value = saved.userName || '';
            }
          } catch (e) { /* 解析失败(脏数据)静默,按空表单处理 */ }
        }

        async function onManualLogin() {
          if (!employeeId.value.trim() || !userName.value.trim()) {
            errorMessage.value = '工号与用户名都不能为空';
            return;
          }
          submitting.value = true;
          errorMessage.value = '';
          try {
            const resp = await fetch('/api/auth/manual-login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                employeeId: employeeId.value.trim(),
                userName: userName.value.trim()
              })
            });
            if (!resp.ok) {
              const text = await resp.text();
              errorMessage.value = '登录失败: ' + text;
              return;
            }
            // 登录成功:记住工号+用户名,下次进入登录页自动回显
            saveLoginMemory();
            window.location.href = window.withBase(getRedirect());
          } catch (e) {
            errorMessage.value = '网络错误: ' + e.message;
          } finally {
            submitting.value = false;
          }
        }

        onMounted(() => {
          restoreLoginMemory();
        });

        return { employeeId, userName, submitting, errorMessage, onManualLogin };
      }
    });
    app.use(ElementPlus);
    for (const [k, v] of Object.entries(ElementPlusIconsVue)) {
      app.component(k, v);
    }
    app.mount('#app');
  </script>
</body>
</html>
