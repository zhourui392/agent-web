<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求事件 · Agent Q&A 管理后台</title>
  <link rel="stylesheet" href="../vendor/element-plus.css">
  <link rel="stylesheet" href="../css/admin.css?v=2026061101">
</head>
<body>
  <div id="app" v-cloak>
    <admin-shell active="requirement-events" @ready="search">
      <template #header-actions>
        <el-button text @click="search" :loading="loading">刷新</el-button>
      </template>

      <div class="view-wrap">
        <div class="conv-toolbar">
          <el-input v-model="filters.actor" clearable placeholder="actor" size="small"
                    style="width: 180px;" @keyup.enter="search"></el-input>
          <el-date-picker v-model="dateRange" type="datetimerange" range-separator="至"
                          start-placeholder="开始时间" end-placeholder="结束时间"
                          value-format="x" size="small"></el-date-picker>
          <el-button type="primary" size="small" @click="search" :loading="loading">查询</el-button>
        </div>

        <el-table :data="events" v-loading="loading" size="small" empty-text="暂无事件">
          <el-table-column label="时间" width="150">
            <template #default="{ row }">{{ fmtTime(row.occurredAt) }}</template>
          </el-table-column>
          <el-table-column prop="requirementId" label="需求 ID" width="150" show-overflow-tooltip></el-table-column>
          <el-table-column prop="eventType" label="事件类型" width="160"></el-table-column>
          <el-table-column prop="actor" label="actor" width="130" show-overflow-tooltip></el-table-column>
          <el-table-column label="from→to" width="200">
            <template #default="{ row }">
              <span v-if="row.fromStatus">{{ row.fromStatus }} → {{ row.toStatus }}</span>
              <span v-else class="muted">-</span>
            </template>
          </el-table-column>
          <el-table-column prop="detail" label="detail" min-width="200" show-overflow-tooltip></el-table-column>
        </el-table>
      </div>
    </admin-shell>
  </div>

  <script src="../js/base.js?v=20260611"></script>
  <script src="../vendor/vue.global.js"></script>
  <script src="../vendor/element-plus.full.min.js"></script>
  <script src="../vendor/element-plus-icons-vue.iife.min.js"></script>
  <script src="../js/admin/shell.js?v=2026070401"></script>
  <script src="../js/admin/pages/requirement-events.js?v=2026070401"></script>
</body>
</html>
